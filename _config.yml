title: differs' blog
description: >-
  Chromium 网络栈 / 浏览器内核 / 广告拦截 / 视频嗅探 — 浏览器工程实践笔记
lang: zh-CN
url: "https://blog.wedevs.org"

# Build settings
permalink: /:year/:month/:title/
markdown: kramdown

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      toc: true

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
