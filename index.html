<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>differs' blog</title>
  <meta name="description" content="Chromium 网络栈 / 浏览器内核 / 广告拦截 / 视频嗅探 — 浏览器工程实践笔记">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="/src/style.css">
  <script id="app-data" type="application/json"></script>
</head>
<body>
  <div class="app-layout">
    <!-- 左侧折叠目录 -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="收起侧边栏">◀</button>
      <div class="sidebar-header">
        <a href="/" class="sidebar-title">differs' blog</a>
        <div class="sidebar-subtitle">浏览器工程实践笔记</div>
      </div>
      <nav class="sidebar-nav">
        <ul class="toc-list" id="toc-list"></ul>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-btn" id="theme-btn">🌙 暗色</button>
        <a href="https://github.com/differs" class="gh-link" target="_blank" rel="noopener">GitHub</a>
      </div>
    </aside>

    <!-- 右侧主内容 -->
    <main class="main-content" id="main-content">
      <div class="content-body" id="content-body">
        <!-- 首页 --> 
        <section class="hero" id="hero-section">
          <div class="hero-squirrel">
            <svg class="squirrel-svg" viewBox="0 0 400 260" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- 尾巴 -->
              <path class="s-tail" d="M 132 155 Q 160 30 265 45 Q 305 48 295 90 Q 288 120 250 125 Q 210 128 175 130 Z"
                    fill="var(--accent)" opacity="0.85"/>
              <path class="s-tail-highlight" d="M 185 100 Q 220 60 260 60 Q 280 62 275 82 Q 270 95 240 100 Q 215 103 195 105 Z"
                    fill="var(--accent-dim)" opacity="0.4"/>

              <!-- 后腿（奔跑伸展） -->
              <path class="s-back-leg" d="M 115 175 Q 105 205 80 215 L 68 210 Q 90 195 100 180"
                    stroke="var(--accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path class="s-back-foot" d="M 68 210 L 55 215"
                    stroke="var(--accent-dim)" stroke-width="6" stroke-linecap="round"/>

              <!-- 身体 -->
              <ellipse class="s-body" cx="155" cy="150" rx="65" ry="36"
                       fill="var(--accent)"/>
              <ellipse class="s-belly" cx="162" cy="158" rx="42" ry="22"
                       fill="var(--accent-dim)" opacity="0.3"/>

              <!-- 前腿（前伸） -->
              <path class="s-front-leg" d="M 192 170 Q 210 195 235 200 L 245 195"
                    stroke="var(--accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <path class="s-front-foot" d="M 245 195 L 255 190"
                    stroke="var(--accent-dim)" stroke-width="6" stroke-linecap="round"/>

              <!-- 前腿 2（后缩） -->
              <path class="s-front-leg2" d="M 185 172 Q 198 188 215 192"
                    stroke="var(--accent)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>

              <!-- 头 -->
              <circle class="s-head" cx="222" cy="128" r="32" fill="var(--accent)"/>

              <!-- 脸颊 -->
              <ellipse class="s-cheek" cx="232" cy="138" rx="16" ry="12"
                       fill="var(--accent-dim)" opacity="0.25"/>

              <!-- 耳朵 -->
              <ellipse class="s-ear" cx="210" cy="98" rx="7" ry="13" transform="rotate(-12, 210, 98)"
                       fill="var(--accent)"/>
              <ellipse class="s-ear-inner" cx="210" cy="101" rx="3.5" ry="8" transform="rotate(-12, 210, 101)"
                       fill="var(--accent-dim)" opacity="0.6"/>

              <!-- 眼睛 -->
              <circle class="s-eye" cx="235" cy="124" r="5.5" fill="#1c1917"/>
              <circle class="s-eye-shine" cx="237" cy="122" r="2" fill="white" opacity="0.9"/>

              <!-- 鼻子 -->
              <circle class="s-nose" cx="252" cy="132" r="4" fill="#78350f" opacity="0.8"/>

              <!-- 胡须 -->
              <g class="s-whiskers" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
                <line x1="250" y1="133" x2="272" y2="128"/>
                <line x1="250" y1="136" x2="274" y2="138"/>
                <line x1="250" y1="138" x2="270" y2="148"/>
              </g>

              <!-- 奔跑飞尘 -->
              <g class="s-dust" opacity="0.25">
                <circle cx="45" cy="215" r="8" fill="var(--accent)"/>
                <circle cx="30" cy="200" r="5" fill="var(--accent-dim)"/>
                <circle cx="55" cy="195" r="4" fill="var(--accent)"/>
                <circle cx="20" cy="220" r="6" fill="var(--accent-dim)"/>
                <circle cx="38" cy="230" r="3" fill="var(--accent)"/>
              </g>

              <!-- 动感线条 -->
              <g class="s-motion-lines" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.2">
                <line x1="75" y1="130" x2="50" y2="126"/>
                <line x1="70" y1="148" x2="40" y2="144"/>
                <line x1="80" y1="165" x2="55" y2="162"/>
              </g>
            </svg>
          </div>
        </section>

        <!-- 动态渲染的文章 -->
        <div id="article-container" style="display:none;"></div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
