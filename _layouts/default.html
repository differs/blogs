<!DOCTYPE html>
<html lang="{{ site.lang | default: "zh-CN" }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | default: site.description }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ "/" | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ "/" | relative_url }}">首页</a>
        <a href="{{ "/" | relative_url }}#posts">文章</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">
        <span class="icon-light">☀️</span>
        <span class="icon-dark">🌙</span>
      </button>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; {{ site.time | date: "%Y" }} <a href="https://github.com/differs">differs</a>. 用 ❤️ 和 Jekyll 构建。</p>
    </div>
  </footer>

  <script src="{{ "/assets/js/main.js" | relative_url }}"></script>
</body>
</html>
